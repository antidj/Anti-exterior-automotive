<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anti Exterior & Auto | Memphis, TN</title>
    <style>
        :root {
            --bg-dark: #121212;
            --card-bg: #1a1a1a;
            --accent-red: #d32f2f;
            --accent-gold: #cca43b;
            --text-light: #ffffff;
            --text-gray: #b3b3b3;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-light);
            line-height: 1.6;
        }

        /* Header & Navigation */
        header {
            background-color: #0a0a0a;
            border-bottom: 2px solid var(--accent-red);
            padding: 1rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .logo-text {
            font-size: 1.5rem;
            font-weight: bold;
            letter-spacing: 1px;
        }

        .logo-text span {
            color: var(--accent-red);
        }

        nav a {
            color: var(--text-light);
            text-decoration: none;
            margin-left: 2rem;
            font-weight: 500;
            transition: color 0.3s;
        }

        nav a:hover {
            color: var(--accent-gold);
        }

        .cta-btn {
            background-color: var(--accent-red);
            color: white;
            padding: 0.6rem 1.2rem;
            border-radius: 4px;
            text-decoration: none;
            font-weight: bold;
            transition: transform 0.3s;
        }

        .cta-btn:hover {
            transform: scale(1.05);
        }

        /* Hero Section */
        .hero {
            background: linear-gradient(rgba(0,0,0,0.75), rgba(0,0,0,0.85)), url('https://images.unsplash.com/photo-1616788494707-ec28f08d05a1?q=80&w=1920') no-repeat center center/cover;
            height: 70vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 0 1rem;
            border-bottom: 3px solid var(--accent-gold);
        }

        .hero h1 {
            font-size: 3.5rem;
            font-weight: 800;
            margin-bottom: 1rem;
            color: var(--text-light);
            text-transform: uppercase;
        }

        .hero h1 span {
            color: var(--accent-red);
        }

        .hero p {
            font-size: 1.5rem;
            color: var(--accent-gold);
            margin-bottom: 2rem;
            max-width: 800px;
            font-weight: 600;
        }

        /* Services Section */
        .services-container {
            padding: 5rem 5%;
            max-width: 1200px;
            margin: 0 auto;
        }

        .section-title {
            text-align: center;
            font-size: 2.5rem;
            margin-bottom: 3rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .section-title span {
            color: var(--accent-red);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2.5rem;
        }

        .service-category {
            background-color: var(--card-bg);
            border: 1px solid #2d2d2d;
            border-radius: 8px;
